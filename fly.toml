app = "argentina-programa-backend"
primary_region = "iad"

[build]

[env]
  SERVER_PORT = "8080"
  COOKIE_SECURE = "true"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"

[deploy]
  release_command = "echo 'No release command needed'"
